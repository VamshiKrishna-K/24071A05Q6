<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .error-text { color: red; font-size: 0.875rem; margin-top: -10px; margin-bottom: 10px; }
  </style>
</head>
<body class="bg-light">
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card p-4 w-100" style="max-width: 400px;">
      <h2 class="text-center mb-3">Create Account</h2>
      <form id="registerForm">
        <input type="text" id="regUsername" class="form-control mb-3" placeholder="Username">
        <div id="usernameError" class="error-text"></div>
        
        <input type="email" id="regEmail" class="form-control mb-3" placeholder="Email">
        <div id="emailError" class="error-text"></div>
        
        <input type="password" id="regPassword" class="form-control mb-3" placeholder="Password">
        <div id="passwordError" class="error-text"></div>
        
        <button type="submit" class="btn btn-dark w-100 mb-3">Register</button>
      </form>
      <p class="text-center"><a href="index.html">Login</a> | <a href="catalog.html">Catalog</a></p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="validation.js"></script>
</body>
</html>
